name: "👁️ Monitor Positions"
on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -q httpx pandas loguru python-dotenv
      - name: Monitor
        env:
          BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LOG_LEVEL:    "INFO"
        run: python main.py --mode monitor
