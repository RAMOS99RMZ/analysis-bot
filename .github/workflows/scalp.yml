# .github/workflows/scalp.yml
# ═══════════════════════════════════════════════════════════════
# ⚡ SCALP — صياد الفرص السريعة
# كل 5 دقائق: Quick Scalp (Fibonacci) + Classic Scalp (11 خبير)
# ═══════════════════════════════════════════════════════════════

name: "⚡ Scalp — Fast Opportunity Hunter"

on:
  schedule:
    - cron: "*/5 * * * *"   # كل 5 دقائق
  workflow_dispatch:

jobs:
  scalp:
    name: "⚡ Run Scalp Engine"
    runs-on: ubuntu-latest
    timeout-minutes: 9

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Bot Environment
        uses: ./.github/actions/setup-bot

      - name: ⚡ Run Scalp Engine
        env:
          OKX_KEY:      ${{ secrets.OKX_KEY }}
          OKX_SECRET:   ${{ secrets.OKX_SECRET }}
          OKX_PASS:     ${{ secrets.OKX_PASS }}
          BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.CHAT_ID }}
          GROQ_KEY:     ${{ secrets.GROQ_KEY }}
          GEMINI_KEY:   ${{ secrets.GEMINI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LOG_LEVEL:    "INFO"
        run: timeout 240 python main.py --mode scalp || true
