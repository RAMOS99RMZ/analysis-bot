# .github/workflows/swing.yml
# ═══════════════════════════════════════════════════════════════
# 🌊 SWING — صياد الاتجاهات المتوسطة
# كل 2 ساعة: يقرأ 1H و 4H ويتجاهل الضجيج القصير
# ═══════════════════════════════════════════════════════════════

name: "🌊 Swing — Trend Hunter"

on:
  schedule:
    - cron: "0 */2 * * *"   # كل ساعتين
  workflow_dispatch:

jobs:
  swing:
    name: "🌊 Run Swing Engine"
    runs-on: ubuntu-latest
    timeout-minutes: 9

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Bot Environment
        uses: ./.github/actions/setup-bot

      - name: 🌊 Run Swing Engine
        env:
          OKX_KEY:      ${{ secrets.OKX_KEY }}
          OKX_SECRET:   ${{ secrets.OKX_SECRET }}
          OKX_PASS:     ${{ secrets.OKX_PASS }}
          BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.CHAT_ID }}
          GROQ_KEY:     ${{ secrets.GROQ_KEY }}
          GEMINI_KEY:   ${{ secrets.GEMINI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LOG_LEVEL:    "INFO"
        run: timeout 240 python main.py --mode swing || true
