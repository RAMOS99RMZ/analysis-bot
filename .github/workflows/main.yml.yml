name: 🤖 Ramos Ai 360 — Live Bot

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    name: 🚀 Run Trading Bot
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Upgrade pip
        run: python -m pip install --upgrade pip

      - name: 📦 Install dependencies
        run: |
          # حذف أي سطر pandas أو pandas-ta قديم من requirements.txt تلقائياً
          grep -v -E "^pandas(-ta)?[>=!]" requirements.txt > requirements_fixed.txt
          # إضافة الإصدارات الصحيحة المتوافقة مع Python 3.11
          echo "pandas==2.2.2" >> requirements_fixed.txt
          # تثبيت الباقي
          pip install -r requirements_fixed.txt
          # تثبيت pandas-ta آخر إصدار يدعم Python 3.11
          pip install --pre pandas-ta

      - name: 🔍 Verify
        run: |
          python -c "
          import pandas, pandas_ta, numpy
          print('✅ pandas   :', pandas.__version__)
          print('✅ pandas-ta:', pandas_ta.version)
          print('✅ numpy    :', numpy.__version__)
          "

      - name: 🤖 Run Ramos Ai 360
        env:
          OKX_KEY:      ${{ secrets.OKX_API_KEY }}
          OKX_SECRET:   ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASS:     ${{ secrets.OKX_PASSPHRASE }}
          BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_KEY:     ${{ secrets.GROQ_API_KEY }}
          GEMINI_KEY:   ${{ secrets.GEMINI_API_KEY }}
          LOG_LEVEL:    "INFO"
        run: timeout 240 python main.py || true
