name: 🤖 Ramos Ai 360 — Live Bot

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    name: 🚀 Run Trading Bot
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Upgrade pip
        run: python -m pip install --upgrade pip

      - name: 📦 Install dependencies (auto-fix requirements.txt)
        run: |
          # حذف أي سطر يحتوي pandas أو pandas-ta من requirements.txt
          # هذا يعمل حتى لو requirements.txt لم يُحدَّث على GitHub
          grep -v -iE "^pandas" requirements.txt > /tmp/requirements_fixed.txt
          echo "✅ requirements.txt بعد الإصلاح:"
          cat /tmp/requirements_fixed.txt
          pip install -r /tmp/requirements_fixed.txt
          # تثبيت pandas و pandas-ta-classic مباشرة (Python 3.11 متوافقة)
          pip install "pandas==2.2.2" "pandas-ta-classic"

      - name: 🔧 Create pandas_ta shim
        run: |
          python - << 'PYEOF'
          import site, pathlib
          sp = pathlib.Path(site.getsitepackages()[0])
          shim = sp / "pandas_ta.py"
          shim.write_text(
              "import pandas_ta_classic\n"
              "from pandas_ta_classic import *\n"
          )
          print("✅ pandas_ta shim:", shim)
          PYEOF

      - name: 🔍 Verify
        run: |
          python - << 'PYEOF'
          import pandas_ta as ta
          import pandas as pd, numpy as np
          df = pd.DataFrame({"close": np.random.uniform(100, 200, 50)})
          df.ta.rsi(append=True)
          print("✅ pandas     :", pd.__version__)
          print("✅ pandas_ta  : OK")
          print("✅ RSI columns:", [c for c in df.columns if "RSI" in c])
          PYEOF

      - name: 🤖 Run Ramos Ai 360
        env:
          # ✅ الأسماء مطابقة تماماً لما في GitHub Secrets
          OKX_KEY:      ${{ secrets.OKX_KEY }}
          OKX_SECRET:   ${{ secrets.OKX_SECRET }}
          OKX_PASS:     ${{ secrets.OKX_PASS }}
          BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.CHAT_ID }}
          GROQ_KEY:     ${{ secrets.GROQ_KEY }}
          GEMINI_KEY:   ${{ secrets.GEMINI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LOG_LEVEL:    "INFO"
        run: timeout 240 python main.py || true
