name: 🤖 Ramos Ai 360 — Live Bot

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    name: 🚀 Run Trading Bot
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 📦 Upgrade pip
        run: python -m pip install --upgrade pip

      - name: 📦 Install dependencies
        run: pip install --pre -r requirements.txt

      - name: 🔍 Verify pandas-ta
        run: python -c "import pandas_ta; print('✅ pandas-ta OK:', pandas_ta.version)"

      - name: 🤖 Run Ramos Ai 360
        env:
          OKX_KEY:      ${{ secrets.OKX_API_KEY }}
          OKX_SECRET:   ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASS:     ${{ secrets.OKX_PASSPHRASE }}
          BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_KEY:     ${{ secrets.GROQ_API_KEY }}
          GEMINI_KEY:   ${{ secrets.GEMINI_API_KEY }}
          LOG_LEVEL:    "INFO"
        run: timeout 240 python main.py || true
