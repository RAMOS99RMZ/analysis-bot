name: 🤖 Ramos Ai 360 — Live Bot

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    name: 🚀 Run Trading Bot
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Upgrade pip
        run: python -m pip install --upgrade pip

      - name: 📦 Install all dependencies
        run: pip install -r requirements.txt

      - name: 🔧 Create pandas_ta compatibility shim
        run: |
          python - <<'PYEOF'
          import site, pathlib
          # pandas-ta-classic تملك نفس API لكن تسمى pandas_ta_classic
          # نصنع shim بحيث (import pandas_ta) يعمل بدون تعديل الكود
          sp = pathlib.Path(site.getsitepackages()[0])
          shim = sp / "pandas_ta.py"
          shim.write_text(
              "import pandas_ta_classic\n"
              "from pandas_ta_classic import *\n"
          )
          print("✅ pandas_ta shim created at:", shim)
          PYEOF

      - name: 🔍 Verify everything works
        run: |
          python - <<'PYEOF'
          import pandas_ta as ta   # يجب أن يعمل الآن
          import pandas as pd, numpy as np
          # اختبار حقيقي: حساب RSI على بيانات وهمية
          df = pd.DataFrame({"close": np.random.uniform(100,200,50)})
          df.ta.rsi(append=True)
          print("✅ pandas_ta   OK — version:", ta.__version__ if hasattr(ta,'__version__') else "classic")
          print("✅ pandas      OK —", pd.__version__)
          print("✅ RSI column  OK —", [c for c in df.columns if "RSI" in c])
          PYEOF

      - name: 🤖 Run Ramos Ai 360
        env:
          OKX_KEY:      ${{ secrets.OKX_API_KEY }}
          OKX_SECRET:   ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASS:     ${{ secrets.OKX_PASSPHRASE }}
          BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_KEY:     ${{ secrets.GROQ_API_KEY }}
          GEMINI_KEY:   ${{ secrets.GEMINI_API_KEY }}
          LOG_LEVEL:    "INFO"
        run: timeout 240 python main.py || true
