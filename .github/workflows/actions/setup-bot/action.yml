# .github/actions/setup-bot/action.yml
# ─────────────────────────────────────────────────────────────
# Composite Action مشترك — يُستخدم في كل workflow
# يحتوي على: تثبيت Python + المكتبات + pandas_ta shim
# ─────────────────────────────────────────────────────────────
name: "Setup Ramos Bot Environment"
description: "Installs Python deps and patches pandas_ta for all workflows"

runs:
  using: "composite"
  steps:

    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: 📦 Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip

    - name: 📦 Install dependencies
      shell: bash
      run: |
        # إزالة pandas و pandas-ta القديمة من requirements.txt مؤقتاً
        grep -v -iE "^pandas" requirements.txt > /tmp/req_fixed.txt || true
        pip install -r /tmp/req_fixed.txt
        # تثبيت الإصدارات الصحيحة المتوافقة
        pip install "pandas==2.2.2" "pandas-ta-classic"

    - name: 🔧 Patch pandas_ta (create shim)
      shell: bash
      run: |
        python - << 'PYEOF'
        import site, pathlib
        sp = pathlib.Path(site.getsitepackages()[0])
        shim = sp / "pandas_ta.py"
        shim.write_text(
            "import pandas_ta_classic\n"
            "from pandas_ta_classic import *\n"
        )
        print("✅ pandas_ta shim created:", shim)
        PYEOF
